<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    if (localStorage.getItem('tetris-theme') === 'light') {
      document.documentElement.classList.add('light');
    }
  </script>
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">RECORDS</span>
          <ol id="records-list" class="records-list"></ol>
          <div class="records-stats">
            <span>Mejor combo: <b id="best-combo">0</b></span>
            <span>Máx. líneas: <b id="max-lines">0</b></span>
          </div>
          <button id="reset-records-btn" class="reset-btn">Resetear records</button>
        </div>

        <div class="panel-section">
          <span class="label">TEMA</span>
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" aria-label="Cambiar tema claro/oscuro" />
            <span class="theme-switch-slider"></span>
          </label>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="overlay-newrecord" class="hidden">
          <p class="new-record-msg">¡Nueva puntuación en el Top 5!</p>
          <input id="player-name-input" type="text" maxlength="12" placeholder="Tu nombre" />
          <button id="save-record-btn">Guardar</button>
        </div>
        <div id="overlay-records" class="hidden">
          <ol id="overlay-records-list" class="records-list"></ol>
          <div class="records-stats">
            <span>Mejor combo: <b id="overlay-best-combo">0</b></span>
            <span>Máx. líneas: <b id="overlay-max-lines">0</b></span>
          </div>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
